<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../my-style.css" />
  </head>
  <body>
    <header>
      <!-- NAVBAR START -->
      <nav>
        <div class="container-fluid">
          <img
            src="../Netflix-assets/assets/netflix_logo.png"
            alt="logo"
            class="logo"
          />
        </div>
      </nav>
      <!-- NAVBAR END -->
    </header>
    <main>
      <h1>Edit Profile</h1>
      <section>
        <div class="container">
          <div class="row">
            <div class="col-12 col-md-3">
              <img src="../Netflix-assets/assets/avatar.png" alt="avatar" />
            </div>
            <div class="col">
              <form>
                <input
                  type="text"
                  class="form-control input-style"
                  value="Strive Student"
                />
                <label for="language" class="mb-2">Language:</label>
                <select id="language" class="form-select border-secondary select-style">
                  <option>English</option>
                  <option>Spanish</option>
                  <option>French</option>
                  <option>German</option>
                  <option>Italian</option>
                  <option>Japanese</option>
                </select>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
